body:
  text: 論光明立題自古稱光明定題為教門一關余亦未敢輕有所議昔寶祐丙辰首衆南湖講斯玄記因而復熟之乃知文本明白而人自迷耳余嘗曰當時吾祖若不因古以三字作譬喻釋吾知其必無順古之釋也若不順古作譬喻釋吾知其亦無附文之釋也何以知然蓋由古師以三字為譬而譬法不周故吾祖一往順古亦以三字為譬遍譬無量法門略言十種三法耳當知順古作譬皆是義推非文之正意也然先順則意在後違故次以附文一釋斥彼義推疏遠備舉經文以生下當體之釋也故曰義推譬喻無有一文等也由是言之則兩科之文皆因古師而有非釋題之正意也然附文一釋雖說名說事猶未知此名事從法性而立也故須當體一章方是申釋三字首題的從法為名也故曰法性可尊可貴名法性為金此法性寂而常照為光此法性大悲能多利益為明入此法門即有金光明菩薩究竟此法門即有金𦦨光明如來等乃至云當體竝是妙寶具足光明非借世金以譬法也蓋第一義諦有名有實義故世間所有一切諸名皆依真理而立也故曰劫初廓然萬物無字等也若然則三字首題的從法為名固何所疑哉四明記文亦無出於此故不必謄敘也雖然文云義有二途應須兩存乃至云若鈍根人以譬擬法若利根人即法作譬神智據此謂利鈍人竝以三字為譬具如集解未知其義如何曰若得前來所說之義必不執此以為難也然神智尚暗於此則今人可知故不得已更為申之文云若鈍根人以譬擬法者意斥古師用譬之失也蓋言鈍人乃以世間金光明此擬法性金光明此得其末而失其本也言利根人即法作譬者意明今釋之得也蓋言利人能了即法性金光明而作世間金光明此得其本而不逐其末也雖不彰言意正如此但文中直指世金等為譬翻倒言之頗似難見耳若爾何須存譬而云義有二途耶曰如來唱題的從單法而今之釋義者不能無利鈍於其間所以雙存法譬二釋而於學者不無利益故須兩存耳例如佛世既有利鈍二機今豈不然所以引經利鈍兩文乃引例耳非證也且空品之文自約聞持稱鈍非謂其以譬擬法也請以今意考彼玄記自見旨歸不勞詳議也論教行五章玄云神力品中約教次第止序品約行次第等記釋云云約教約行之分無他但名有在纏能詮之殊而用居第二第四之異此固記中已說而今古莫不知之然約教之名乃從吾佛果後施教而說故云欲說此法先以神力駭動等也未知約行之名從何立耶若云從佛立名佛已證果何須約行若云從機前標體中云今取佛所見為實相正體標宗中云所謂佛自行因果以為宗也標用中云三種權實二智皆是力用標教相中約化道始終師弟遠近是則五章之名皆從佛立敢問其旨如何曰今之五章本為釋經之首題故稱為妙法之名妙法之體妙法之宗妙法之用妙法之教相也然妙法寂滅本無於名亦無於體宗用教相皆不可得故寄果佛以釋妙法之名故云原聖建名蓋為開深以進始等也體宗用教皆寄果人以顯之故標五章皆從佛說蓋由如來因聞名故識體欲顯體故修行行成故利他分別故為教是故五章扶行次第竝寄果人顯於妙法故也然如來既證此妙法今說示於人欲令衆生依而行之是知五章雖寄於果其意在於今之行人是以文文之下皆約觀心良由於此論玄文引壽量證經體文玄云不如三界止今取佛所見為實相正體也記釋云云或問按本疏釋此文云不如三界者不同二種三界人之所見也據此則自等覺已還未離三界皆非佛所見也然此中乃云菩薩人見三界亦如亦異則似但簡偏教菩薩而已二文進退敢問所安答曰應知此旨不唯祖誥如是而佛經亦如是也且如方便文初云唯佛與佛乃能究盡據此則等覺已還皆不能測也而偈文乃簡不退菩薩是則但齊別教教道而已佛祖之言如是信非造次可得議之蓋由經體乃是果人究顯上品寂光故云簡非分證已還臣子之體此體非二種三界人之所見也而今文唯簡偏人者以由圓教因人雖未能究顯此體而初心之人便用佛智照境以上寂光而為觀體有此義故置而不論盡理言之須簡分證可也故光明觀疏唯取君父意在於此然記言長壽祇是證體之用未是親證實相體者應知此之二句即釋伏疑意也疑云既云本門正意顯壽長遠今何不與長壽辨同而引非如非異者何是故釋云長壽祇是證體之用等也蓋由本門顯於佛用長遠以三身言之即當應用此用元由智與體冥方能有用故妙記云長壽之由其唯法報是也今取所冥之體即是非如非異與迹門實相體一名殊實相雙遮即非如非異雙照如異故云體同也或問文云今取佛所見為實相正體古人謂是廢權之文其說如何曰應知此文寄眼智以明之非廢權之文也如經云唯佛與佛乃能究盡諸法實相光明云如來所遊等是皆取佛所知見之理為體耳豈皆廢權之文歟前文云一切不出法性正是佛所見非如非異雙照如異也二文一揆何開廢之異哉所以不取四眼所見者以皆有無明之膜故也論玄籤指文例玄云若廢權顯實如前所用記釋云如前標體中等記釋指前之文定之者或異故今出之須知此指有文有意若據意者此問既因離謗之文而生故今還指離謗之文蓋四謗不出前之三教即是自行化他及化他體也若指文者即章安私謂中云既不會正體攝屬何法但空是化他之實但不但是自行化他之實出二邊中是自行之權竝他經所說非今體也即此文是或謂既是私謂大師不應預指須知三部之中互指前後竝出於章安結集者之意耳當大師高座宣揚之時道俗顒顒欽渴法乳大師樂說之辨流瀉不竭豈得但指而不說乎能知此意則於文不壅也如下玄云直對一番四諦如前說記釋云言如前者如前私釋學者苟能舉隅而反則知前云有翻無翻事如後釋者豈大師指之乎謂之別時講經之序無可疑矣論妙記釋中止一城文記釋中止一城之文有云始末雙明故云勝劣說者紛紜今略議之若夫如來未施化前中止於方便土中伺覓同居子機若準起於一代五時之化則雙垂勝劣兩應勝應應菩薩劣應應聲聞約於大小兩始而言也今觀記釋五人生方便土者專約一類小機而說故云四果支佛斷盡通惑者同生其中皆為菩薩等據此既約小機而說則始在鹿園見劣終於彼土見勝約此以論始末也必矣所以然者諸大乘經菩薩見勝此是常談而此經能開難開之人故三周說法正意唯在二乘故約小機而論始末乃一經之元意也所以記釋五人之名雖約藏通兩教進退可否而論而終以三藏五人為正故曰但彼對勝應其義不成等是則專約一類小機而說蓋無可疑矣論妙記釋轉法輪文記釋轉法輪之文有曰若約跨節通四如來等或者不達乃對玄文何處別有四教主之文作難以余觀之無可難者今文先約跨節故云通四如來凡有所說無非化他蓋準佛意雖現四身說無非隨他意語故云化他也又以圓自對三教為他亦跨節之意此皆泛論耳今論經中正意約於波羅奈初轉法輪且從三藏當分義邊約佛內證之法轉示於人故云轉法輪耳汝所證者我亦證之其斯之謂也若夫玄文則曰祇是隱其無量功德莊嚴之身現為丈六紫金輝等正是點此當分之身從今佛示現耳與記泛論之文語雖不同其意無別故皆名跨節也尚何難之有哉論三法無邊玄云色無邊故般若亦無邊記云五陰是理故即陰是實相般若故皆無邊以由理故令法無邊四明嘗於妙宗引用此文以明頓足之義祇緣淨覺執生身但可即自受用及以法身不即尊特故四明引此文畢乃云自受用身既證極理豈不即劣而無邊邪此文意者五陰報法一一即理理無邊故法亦無邊又即此便是實相般若三法具足皆悉無邊何者理即是法般若是報五陰是應既皆無邊方名頓足若如淨覺所解劣應不即尊特何名色無邊邪應知此文同起信論彼云從本以來色心不二以色性即智故色體無形說名智身以智性即色故說名法身遍一切處所現之色無有分齊隨心能示十方世界各各差別皆無分齊而不相妨文嗚呼使淨覺知所現之色無有分齊必不執劣應非尊特矣論玄序十德玄第一德云自解佛乘至第九德云玄悟法華圓意或問佛乘與法華圓意一也而前後重出者何曰佛乘之言且通指一經而含待絶之意故記釋云即是今典永異餘教不同三五七九等乘相待仍開會之使歸乎一極絶待蓋今經獨得妙名功由此二所以獨受佛乘之名若前四時兼帶之教全無二妙縱有圓融不稱佛乘也玄悟法華圓意者別舉五重玄義釋經首題自於一家故列為十德之一豈有重繁之咎乎所以列次在於第九而第十繼之以樂說辨者蓋此十德前之八德且是通舉大師具足定慧弘法隱居出為帝者之師而受道俗讚禮至第九第十方是別開今經玄義晝夜流瀉此乃從通以至別所以得為玄文之序也或問發悟之言乃是謄前自解佛乘即大蘇妙悟之時也獲旋陀羅尼正此時也今又開為第二一德豈非重纍乎曰最初一德正言發悟自解佛乘第二一德正言深入禪定三昧故第三德中總舉上二云縱具定慧也而此復云得陀羅尼者蓋相帶來耳以得陀羅尼由於入定故也記指發悟屬慧而不及於陀羅尼者意則可知也論萬乘數愚嘗考王制及班史地理志皆言方里為井為田九百畝井十為通通十為成地方十里為方一里者百為田九百畝以井田計之適一百井也除三十六井為山陵林麓川澤溝瀆城郭宮室途巷之外其餘六十四井共出車一乘自此等而上之則千乘萬乘之數皆可計也謂成十為終終十為同同方百里為方十里者百為田九十億畝以井計之則一萬井也同十為封受田十萬井其賦出車千乘即大諸侯之國也封十為畿畿方千里為方百里者百為田九千億畝以井計之則百萬井也其賦出車萬乘即天子之國也今記云十井為乘井字恐誤應云十里蓋十里為成出車一乘故云十里為乘也言百里之國適千乘者蓋同方百里同十為封既未逮於地方千里之數故皆稱為百里之國或曰何以六十四井共出車一乘曰周禮九夫為井四井為邑四邑為丘丘十六井也四丘為甸甸六十四井共出兵車一乘戎馬四匹牛十二頭甲士六十三人步卒七十二人此所謂徹也論輔行十義評無情佛性余讀止觀至記中以十義評無情佛性雖與金錍相表裏但最初約身一義頗覺難曉異時曾見賢首藏法師起信論疏釋歸命偈有曰及彼身體相等方知吾祖評破之意正對彼疏而作也當知一者約身二者約體皆本彼立義而說也蓋由彼疏以彼身二字指上佛寶即最勝業遍知等體相二字即屬法寶即法性真如海等既以身屬佛實約於報化二身而說以今家義定之即勝劣兩應也體相屬法寶以今家義定之即法身自報也故今先本彼以身屬佛為難故云不可獨云有應身性等次本彼以體相屬法為難故云既許法身遍一切處報應未嘗離於法身等也苟不知此則顯吾祖破斥孤然全無來歷至若金錍四十六問中亦有此義義學之士不可不知故今特表而出之論玄籤稱味味例玄問既以五味分別那同稱漸記釋云問前五味教相味既有五何故中問三味皆名為漸善乎孟子之論曰不以文害詞不以詞害意是不獨為說詩者言故凡看讀之法莫不然也且今文云既以五味分別那同稱漸使惑者讀之必以法華亦稱為漸而有紛紜之說唯毗陵以意逆之但約中間三味而釋則無可疑者又下文不定教後云味味中悉如此使昧者讀之必謂法華亦有不定而致無窮之難唯記主以意逆之乃云乳中則圓別相對以辨不定乃至生熟二酥三四對辨由此釋之故人無疑者惜乎今人不能觸類而長才聞味味之言必須具約五味而說亦甚可笑也如後記云五味則一道豎進味味各有半滿相成復於味味皆有祕密及以不定至今說者不能解紛請以今文格之可不言而喻矣頌解金錍四十六問問佛性之名從因從果從因非佛果不名性圓明究竟名為佛直指衆生性本然若向名中思得義十方身土有何偏問佛性之名常無常耶無常非性常應不變性名不變古常然剎剎塵塵覺照圓強把真如分兩派定知其說落邪偏問佛性之名共耶別耶別不名性共不可分依正同彰一性靈休於兩處各安名世人多用情分別請把斯文子細評問佛性之名大小教耶小無性名大無無情大乘了義非凡說互古從今不變遷山色溪聲常示現莫將情見錯流傳問佛性之名權耶實耶對體辨異其相何耶依體立名名大教有名無實號權方若知名實元相稱瓦礫時時盡放光問無情之名大小教耶大教大部有權實耶涅槃部大兼權說便有三非躄用殊可惜清涼明眼老錯將魚目認為珠問無情無者無情為色為非色耶為二俱耶無情是色非無色真顯方堪號二俱陰體既同為質礙如何一有一偏無問無情色等佛見爾耶為生見耶為共見耶衆生眼見號無情佛眼觀之等性靈生佛雖然無共見應知一處不殊形問無情敗壞故無性者陰亦敗壞性亦然耶世間動植同歸壞佛性何緣有去留苟順凡情論妙法空教白盡少年頭問無情是色法界處色為亦無耶為復有耶界入科中多屬色非唯瓦石是無情若非佛智同觀察生滅何時得暫停問唯心之言子曾聞耶唯只是心異不名唯十方剎海從心現一代雄詮似鏡明此外既無塵許法更於何處覓無情問唯心之言凡聖心耶若聖若凡二俱有過凡心取著沈生死聖智高明等太虗過此若言觀一念行人當自識規橅問唯心名心造無心耶唯造心耶二俱有過心與無心均是物都從吾一念中生凡情淺識徒分別未免偏枯異見成問唯心唯心亦唯色耶若不唯色色非心耶根境法中堪入道隨人宜樂體無差天台門戶如天闊自是時人病眼華問唯心所造唯依與正依正能所同耶異耶果地融通能所一本從凡地妄心成自緣狹見初乖隔到了何曾有二名問衆生量異性隨異耶不爾非內爾不名性衆生自有無窮異箇事明明豈變遷若道遮那唯陰質似觀雲霧不知天問衆生惑心性遍不遍神我四句為同異耶惑性遍兮無處所山河大地已全該世人自局居身內羸得波旬笑眼開問衆生有性唯應身性亦法性耶亦報性耶三身一體無前後一念才空總見成若計修因能趣果可容似應隔無情問衆生本迷迷佛悟耶佛既悟已悟生迷耶迷悟乍分凡聖異猶如明暗不相除若知全暗為明理此性何緣會不俱問衆生一身幾佛性耶一佛身中幾生性耶一性圓明無有幾紛紛情識等河沙世人錯認情為佛何啻天涯萬里賒問佛國土身為始本耶始本同耶為復異耶佛國土身全本起本來身土不乖殊請君自讀華嚴典豈有無情可廢除問佛土佛身為一異耶一無能所異則同凡三千究顯亡能所依正何妨又宛然若向箇中明得透天台鼻孔許伊穿問佛土界分生亦居耶為各所居佛無土耶普天率土皆王國民物擅守疆一佛土成周法界滿中凡聖死還生問佛土所攝為遠近耶何土與生一異共別橫論諸土皆相攝約豎言之下攝高唯有寂光名理體與生元不隔絲毫問佛佛土體為同異耶娑婆之處為共別耶豈離伽耶有寂光無邊諸佛盡含藏當知此理曾無間瓦礫堪稱大法王問佛成道時土亦成耶成廣狹耶不成有過佛成身土一時成廣狹皆因機見生理土從來無廣狹終年共住不知名問佛成見性與生見處為同異耶離二不可如來元是衆生做見處何時有兩般可惜紛紛迷路客從前只被眼睛瞞問佛成土咸與彼彼成彼彼不成為一異耶諸佛同成淨法身猶如天上一冰輪自緣衆水分清濁影現何曾有不均問佛成三身與彼彼果及彼彼生為一異耶佛有三身生亦具偶因迷悟乍分途更於一異生分別天性從茲轉見疏問佛成身土成何眼智見自他境初後如何佛眼周觀境不殊大圓鏡智絶名橅寄言學者能如此那箇無情佛性無問真如所造互相攝耶不相攝耶二俱如何萬法盡從真變造猶如燈鏡互交輝若言依正成乖異知是渠儂正眼虧問真如之體通於修性修性身土等不等耶事理互成無缺闕若身若土盡周圓非關造作能如此自是天真性本然問真如隨緣變為無情為永無耶何當有耶不變隨緣依與正隨緣不變豈終殊他家幸識真如理何事甘心適異途問真如隨緣隨已與真為同異耶為永隨耶黃金打作瓶盆用鎔煉瓶盆又作金金體本來無二相紛紛工作苦勞心問真如本有為本無耶與惑共住同異如何真金頑礦同時有頑礦應銷不動金此理雖然同惑住定知煩惑不能侵問波水同異前後得失真妄同異法譬如何全波是水無同異全水為波沒後先明得此兮方不失乃知真妄法皆然問病眼見花花處空處同異存沒法譬如何眼因帶病華存沒空體何嘗暫動搖世謂無情如病見邪無之責諒難逃問鏡像明體本始同異前後存沒法譬如何鏡明如性像如修體相圓成翳不留前後本無存與沒如斯至理莫他求問帝網之譬唯譬果耶亦譬因耶果無因耶影現珠珠帝網全惟因與果理皆然剛言瓦石猶非佛以喻方之定落偏問如意珠身身有土耶唯在果耶通因如何珠名如意曾無間果用全彰應所求請就此心明此理纖塵不現理非周問行者觀心心即境耶能所得名同異如何諦觀乍分能所別一心融泯豈應殊若知心外元無境依正何因有異途問行者觀心一耶多耶一多心境同異如何一即多兮稱曰假多還即一號為空非多非一名中道心境如斯絶異同問行者觀心為唯觀心亦觀身耶亦觀土耶觀分內外隨機用性體圓融是處彰於此若還生揀別定知孤負法中王問行者觀心在惑業苦內耶同耶異耶天台正統超諸說妙道何須向外求三障本非元即是臨崖觀虎使人愁問行者觀心心內佛性為本淨耶為始淨耶人人有箇天真佛不假修持照用全若道本無今始有山家宗旨隔天淵問行者觀心心佛衆生因果身土法相融攝一切同耶龍猛宗傳九世孫金錍決膜導迷津一家所本文誠委三法無差理最親末上已觀明自行問餘重示驗他人從茲野客心開解一答皆通不在頻首衆南湖講光明玄題甚深法性徹過去而極未來圓妙經王統羣靈而該萬有絶思絶議可貴可尊其性虗融似春行於大地其體獨脫如月朗於中天纖入無倫大包無比是如來之所證過菩薩之所行譬喻莫盡其涯逈出虗空之量讚嘆曷窮其妙徒檛金鼓之聲信相於此未免懷疑樹神於此空知雨淚林間雕虎無所施其爪牙澤內靈魚曾未測其涓滴是妙智境號中道空懺讚雙融生法俱泯名尊體極用大宗深教既稱王橫該豎攝非智者孰攄其蘊捨四明罕得其傳掃蕩邪宗張正說符一家之玄道救十法之觀心解行兼明自他均益盛矣哉斯道也仰觀之天日月星辰之運行俯察諸地山嶽江河之渟峙龍神鬼畜動植飛鳴出沒低昂盈虗消長頭頭顯露處處全彰夫如是則堂雨天華露柱燈籠無非法性橋橫水月霜風落木盡是金光擬之則萬別千差會得乃百慮一致如斯提唱已涉支離直截為人如何舉似擊拂子靈鳳已翔霄漢去可憐方始探鳩巢觀經疏題唯心淨土豈離乎苦域泥沙本性彌陀無越乎棘林胎獄若使心無取舍則淨穢之相泯然其如行有順違故粗妙之名斯立是以闍王示逆而圓機發起欲彰性惡之本融韋提哀請而大聖宣揚蓋顯修心之要術觀雖不二爰開十六以為進德之階理既無殊當以三千而作司南之運舉一觀而遍收諸觀統羣機而咸會一機義趣幽深文詞奧密非智者親承之妙孰闡其宗捨四明頴悟之懷寧知其道修心妙觀到無修處正好著鞭落日故鄉向冷落中何妨進步苟或膠文滯相懸知其於斯道冥然要須了境唯心則在我者能事畢矣將釋茲疏略舉大猷至下臨文更當委說觀音玄題真智常圓如春在百華豈有去來之相應身不斷似月臨衆水曾無取捨之心不墮見聞寧容擬議子規啼夜月苦口何多楊柳舞春風勞形不少說甚慈悲與拔機應顯冥但了自心更無別事會得目前無法圓通門彈指豁開若於境上生心羅剎國應時飄墮如斯舉唱猶在半途芝峰主人有何方便從今未免頻頻舉箇事何曾在舌頭法華文句題妙法不可以言宣要由自悟大教元從於理立豈假他求二十八品皆古佛之真心六萬餘言乃含靈之祕藏用因緣約教待絶之義已在其中明本迹觀心事理之名無越於此本懷暢矣妙義冷然衣坐室處處流通豈逾於當念種熟脫番番無廢不離於剎那是別鵲噪鴉鳴皆承記莂松風㵎水一等敷揚正恁麼時如何話會太虗有口談何盡露柱無心聽始真十不二門題十不二門者乃斯經本迹之大猷今家解行之要術以十妙為觀體深符圓頓之宗以一念為指歸備盡修證之旨坦然明白可舉而行中興尊者從而鈔釋之發明教觀兼舉之正途開闢事理抗分之邪說使後之學者思修有託宗說俱通其猶騁六驥於康莊耀神珠於心目羣疑冰釋大道風行正恁麼時如何點示薰風生殿閣懷抱為誰傾入廣恩祝聖講題大道只在目前色見聲求總沒交涉虗空生我心內鶯啼華笑恰爾見成摩竭國行布圓融分疏下不毗耶城彈呵攝受節目轉多就中自有生涯向上別無巴鼻指權是實歡呼萬國來朝即劣為尊羅列衆星齊拱直得溪山改觀雲漢昭回泉涌醴而崖産芝河圖呈而洛書出祥風被野秀麥如雲人人穩駕白牛車物物共談無上法然雖如是且道以何為驗邊頭不獻平戎策野外時聞擊壤歌先師頑空和尚三千說附昔人有云三千立法合於假諦上說之以空彰亡泯中彰絶待不當建立故剋體言之須於假上立三千也然後即此假法即空即中却廣引諸文為證今謂直就假上說三千其文雖多要而言之無出輔行觀具一文足以統貫諸說如云具即是假假即空中又云尚不識具豈識空中豈非的就假上示具具之一字即三千也然後假即空中耶後人因此於假上建立三千推原此說出於淨覺復宗次之指南又次之弊源一泄勢不可遏今人往往承用者衆殊不知廣智傳法智之道凡此等文竝是寄事而辨為示三觀之相令易見故且以三千而為假耳是故先示三千辨其妙假然後即空即中三諦顯矣輔行釋止觀妙境三千前後諸文竝直明三千即三諦只此一文寄事而辨是總例之文須究寄之一字非是正意正意有二一者三千即三諦二者三千即中諦言三千即三諦者約體德而示也蓋才言三千妙境體也任運具三不須先於假上立三千已然後方即空中也波水之喻其義最親水之溼中水之明空水之動假水體一也曰溼曰明曰動者德也故才言於水任運具三不須先於動上立此一水然後方即溼與明也帝惠王喻帝網珠金師子等例此可知舉一人一網一師子任運具三思之可見然寄事而辨輔行只此一文以為總例則諸文中有於假上說三千然後即空中者皆是寄事而辨非文之正意也二者三千即中諦者乃從勝而示祖師作此顯示厥有深旨良以中者不偏為義絶待為功若於諸法有所偏倚有所對待何能諸法互融互入耶所以別教謂十定十但成十界不談百界三千世間圓知中道當體不偏當體絶待故立妙名學者應知三千是絶待之法合於中諦示之斯乃從勝而示中必雙照三諦具足故不妨諸文三千即三諦也今更以帝網之喻申明斯義其猶帝網百千萬珠舉一寶網全體任運具三曰含容中曰明淨空曰光影假然究了所以珠珠交映重重無盡正由珠有含容之德故從義而示就寶網之上舉一含容則珠之明淨光影二義皆顯應知舉一寶網者三千之全體也曰含容明淨光影者三諦之德也中以示其含容也空以示其明淨也假以示其光影也點一中道絶待則空之虗通假之建立二義皆顯也推原此道實見於如來金口親宣非天台大師自為之說經不云乎唯佛與佛乃能究盡諸法實相豈非三千實相乃的示中道天台大師靈嶽親承說圓頓止觀則曰初緣實相提起諸法實相造境即中點此三千妙境是中道也無不真實故云一色一香無非中道此是大師略說己心所行法門至第五卷廣說造境即中之觀不出一念三千名為妙觀也須究妙字即是今經題云妙法是也此之妙法世尊自說是法非思量分別之所能解唯有諸佛乃能知之當究是之一字乃指法之辭不指三千更指何法世尊既說唯佛能知又道唯佛與佛乃能究盡諸法實相則知實相者無生死相無涅槃相無相之相即中道也中故妙妙故不可思議天台大師準此立不思議境名荊溪則曰故止觀中不思議境一念三千非思量分別之所解文見釋籤第二是故定此不思議名因推佛祖相承彌顯即中之道不出三千妙境而已荊溪深領此旨點示野客一言以斷之曰而此三千性是中理可謂盡其妙也輔行正示妙境文云大師於覺意三昧及誦經法小止觀等諸心觀文但以自他等觀推於三假竝未云一念三千乃至觀心論中亦只以三十六問責於四心亦不涉於一念三千唯四念處中略明觀心十界而已信知三千諸法不易得聞其猶世尊四十餘年久默斯要故至止觀正明觀法竝以三千而為指南乃是終窮究竟極說指要云一念三千為開顯大綱又云即中是法身究竟義故豈非的指中道耶故序中云說己心中所行法門一句驗大師心中所行行於中道即同十方三世諸佛常居中道常行中道若不然者何名初心即用佛智照境耶何名上品寂光為觀體耶初緣實相造境即中蓋見於此荊溪斷云性是中理不亦宜乎淨覺到此自當結舌然猶曲為之辭曰不觀三千照境不遍必須遍攬因果自他依正觀於己心指南之意正在茲耳今試問之若如此說則是止觀正明觀法乃以俗諦為指南也果然者應改大師造境即中為造境即俗可也荊溪點野客亦合云性是俗理可也又指南二字始與其曲說其如終窮究竟極說說己心中所行法門莫不以俗諦為極說耶以俗諦為所行法門耶嶽師縱有天辨其莫能救矣學斯宗者當具宗眼詎得不究其本而濫用承襲之說乎今更於祖師語中指出二字以證其說所謂是字寄字言是字者如云性是中理又云三千即中等蓋即者是義也言寄字者如云可寄事辨請評是之與寄相去幾何寄名為客即一往之辭非盡理之論是者即須當體全是方名為即故道性是中理三千即中方為盡理之論一定而不可易也今既云可寄事辨豈非一往之義乎或曰二字與奪敢不聞命其如輔行具即是假假即空中之文何以通之曰
