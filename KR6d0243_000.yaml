front:
  text: 刻教觀撮要論序教觀撮要論未見全書不詳作者及其卷數然其第四卷末曰先師頑空和尚三千說附則其門人所著而卷止於第四必矣吾師嘗借此書於長安興聖禪剎寫焉乃嘆曰惜乎此書多所發揮而放失不完日者命余曰崑山片玉豈忍棄捐何不印摸流布乎余於是傍加國語付諸劂生覧者倘得完書補成是望寶永元年初冬日天台安樂蘭若沙彌覺潭謹序台宗教觀撮要論目卷第三論諸部經王論光明經王論輔行引大經明被接文論聲聞攝屬論三日喻文論解謗別圓初心見佛論立識生法論華嚴聲聞有無論玄文四序論四種教證論法華教主論籤文四心同一行一緣論當機結緣二眾論含中發習論三千餘義論中諦具法又玄云又人聞一切法趣即非漏非無漏具一切法也論部教之義論四教破性論籤文起心之義論隱實施權卷第四論光明立題論教行五章論玄文引壽量證經體文論玄籤指文例論玅記釋中止一城文論玅記釋轉法輪文論三法無邊論玄序十德論萬乘數論輔行十義評無情佛性論玄籤稱味味例頌解金錍四十六問首眾南湖講光明玄題觀經疏題觀音玄題法華文句題十不二門題入廣恩祝聖講題先師頑空和尚三千說附
